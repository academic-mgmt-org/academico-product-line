name: Publish images

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: database
            context: services/academico-esquema-bd
            dockerfile: services/academico-esquema-bd/Dockerfile.postgres-ssl
          - image: login
            context: services/academico-login
          - image: gateway
            context: services/academico-gateway
          - image: usuarios
            context: services/academico-usuarios
          - image: matriculas
            context: services/academico-matriculas
          - image: calificaciones
            context: services/academico-calificaciones
          - image: notificaciones
            context: services/academico-notificaciones
          - image: web
            context: services/academico-web
          - image: quality-dashboard
            context: services/academico-quality-gates
          - image: quality-exporter
            context: services/academico-quality-gates/exporter
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run assets:sync -- products/producto-plataforma-completa.yml
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile || format('{0}/Dockerfile', matrix.context) }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/academico-${{ matrix.image }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/academico-${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/academico-${{ matrix.image }}:${{ github.ref_name }}
          severity: HIGH,CRITICAL
          exit-code: '1'
