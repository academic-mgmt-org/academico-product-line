{{- if .Values.monitoring.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: academico-slo-alerts
spec:
  groups:
    - name: academico.slo
      rules:
        - alert: AcademicoServiceDown
          expr: up{job=~"academico.*"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Un servicio académico no está disponible"
        - alert: AcademicoHighLatency
          expr: histogram_quantile(0.95, sum by (le, service) (rate(http_request_duration_seconds_bucket[5m]))) > {{ .Values.monitoring.latencyP95Seconds }}
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Latencia p95 por encima del SLO"
{{- end }}
