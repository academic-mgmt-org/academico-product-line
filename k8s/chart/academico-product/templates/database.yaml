apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: academico-database
  labels:
    app.kubernetes.io/name: academico-database
    {{- include "academico.labels" . | nindent 4 }}
spec:
  serviceName: academico-database
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: academico-database
  template:
    metadata:
      labels:
        app.kubernetes.io/name: academico-database
        {{- include "academico.labels" . | nindent 8 }}
    spec:
      containers:
        - name: database
          image: {{ .Values.global.registry }}/academico-database:{{ .Values.global.imageTag }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: academico
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: academico-secrets
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: academico-secrets
                  key: DB_PASSWORD
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "academico"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: postgres
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: academico-database
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: academico-database
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
