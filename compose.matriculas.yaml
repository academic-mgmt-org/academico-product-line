services:
  matriculas:
    build:
      context: ./services/academico-matriculas
    image: academico/matriculas:local
    environment:
      NODE_ENV: production
      PORT: 3005
      SERVICE_NAME: academico-matriculas
      MATRICULAS_API_KEY: ${MATRICULAS_API_KEY:-local-matriculas-api-key-change-me}
      DB_HOST: database
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-academic_management_db}
      DB_USER: ${POSTGRES_USER:-academic_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-academic_password}
      DB_SSL: require
      PGSSLMODE: require
    ports:
      - "${MATRICULAS_PORT_HOST:-3005}:3005"
    depends_on:
      migrations:
        condition: service_completed_successfully
      usuarios:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "const s=require('net').connect(3005,'127.0.0.1',()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    networks: [academico]

  gateway:
    environment:
      MATRICULAS_BASE_URL: matriculas:3005
      MATRICULAS_API_KEY: ${MATRICULAS_API_KEY:-local-matriculas-api-key-change-me}
    depends_on:
      matriculas:
        condition: service_healthy
