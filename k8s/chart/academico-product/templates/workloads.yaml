{{- range .Values.components }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: academico-{{ .name }}
  labels:
    app.kubernetes.io/name: academico-{{ .name }}
    {{- include "academico.labels" $ | nindent 4 }}
spec:
  replicas: {{ $.Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: academico-{{ .name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: academico-{{ .name }}
        {{- include "academico.labels" $ | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .port | quote }}
    spec:
      containers:
        - name: {{ .name }}
          image: {{ $.Values.global.registry }}/academico-{{ .name }}:{{ $.Values.global.imageTag }}
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports:
            - name: service
              containerPort: {{ .port }}
          envFrom:
            - configMapRef:
                name: academico-config
            - secretRef:
                name: academico-secrets
          readinessProbe:
            tcpSocket:
              port: service
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: service
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml $.Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: academico-{{ .name }}
  labels:
    app.kubernetes.io/name: academico-{{ .name }}
    {{- include "academico.labels" $ | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: academico-{{ .name }}
  ports:
    - name: service
      port: {{ .port }}
      targetPort: service
{{- if $.Values.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: academico-{{ .name }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: academico-{{ .name }}
  minReplicas: {{ $.Values.autoscaling.minReplicas }}
  maxReplicas: {{ $.Values.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $.Values.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
{{- if $.Values.podDisruptionBudget.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: academico-{{ .name }}
spec:
  minAvailable: {{ $.Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: academico-{{ .name }}
{{- end }}
{{- end }}
